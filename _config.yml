# Hexo Configuration
title: Soar Blog
subtitle: ''
description: ''
keywords:
author: Soar
language: zh-CN
timezone: ''

# URL
url: http://localhost:4000
permalink: posts/:abbrlink.html
permalink_defaults:
pretty_urls:
  trailing_index: true
  trailing_html: true

# Directory
source_dir: source
public_dir: public
tag_dir: tags
archive_dir: archives
category_dir: categories
code_dir: downloads/code
i18n_dir: :lang
skip_render:

# Writing
new_post_name: :title.md
default_layout: post
titlecase: false
external_link:
  enable: true
  field: site
  exclude: ''
filename_case: 0
render_drafts: false
post_asset_folder: false
relative_link: false
future: true
highlight:
  enable: true
  line_number: true
  auto_detect: false
  tab_replace: ''
  wrap: true
  hljs: false
prismjs:
  enable: false
  preprocess: true
  line_number: true
  tab_replace: ''

# Home page setting
index_generator:
  path: ''
  per_page: 10
  order_by: -date

# Category & Tag
default_category: uncategorized
category_map:
tag_map:

# Date / Time format
date_format: YYYY-MM-DD
time_format: HH:mm:ss

# Pagination
per_page: 10
pagination_dir: page

# Extensions
theme: anzhiyu

# 追番设置
bangumi:
  enable: true
  source: bili
  vmid: "321580549"
  path: bangumis/index.html
  title: '追番列表'
  quote: '生命不息，追番不止！'
  show: 0
  lazyload: true
  webp: true
  progress: true
  pagination: false
  metaColor: "#555"
  color: "#555"

# Search (本地搜索)
search:
  path: search.xml
  field: post
  content: true
  format: html

# Deployment
deploy:
  type: ''
