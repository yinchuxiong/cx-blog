<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>登录 — Soar Blog 管理后台</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><rect width='64' height='64' rx='12' fill='%23425AEF'/><text x='32' y='44' font-size='36' text-anchor='middle' fill='white'>安</text></svg>">
  <style>
    :root {
      --primary: #425AEF;
      --primary-deep: #2F45D8;
      --primary-bg: rgba(66, 90, 239, 0.08);
      --gold: #F7B731;
      --gold-bg: rgba(247, 183, 49, 0.16);
      --vermilion: #FF4D4F;
      --text-primary: #1F2430;
      --text-secondary: #4E5969;
      --text-muted: #86909C;
      --text-placeholder: #AAB2C0;
      --bg-body: #F7F9FE;
      --bg-card: #FFFFFF;
      --border: #E4E8F3;
      --border-light: #EEF2FA;
      --shadow: 0 8px 24px rgba(31, 36, 48, 0.08);
      --shadow-lg: 0 18px 48px rgba(31, 36, 48, 0.14);
      --radius: 12px;
      --radius-lg: 16px;
      --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      font-size: 14px;
      color: var(--text-primary);
      background:
        linear-gradient(180deg, rgba(66, 90, 239, 0.06), rgba(66, 90, 239, 0) 320px),
        radial-gradient(circle at 88% 6%, rgba(247, 183, 49, 0.12), transparent 280px),
        var(--bg-body);
      display: flex;
      align-items: center;
      justify-content: center;
      -webkit-font-smoothing: antialiased;
    }
    button { cursor: pointer; font-family: inherit; border: none; outline: none; }
    input { font-family: inherit; outline: none; border: none; }
    :focus-visible {
      outline: 2px solid var(--gold);
      outline-offset: 2px;
      border-radius: 3px;
    }

    /* ── Login Card ── */
    .login-wrapper {
      width: 420px;
      max-width: 92vw;
      animation: fadeUp 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .login-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow-lg);
      border: 1px solid var(--border);
      padding: 44px 40px 40px;
    }

    .login-brand {
      text-align: center;
      margin-bottom: 36px;
    }

    .login-brand-icon {
      width: 56px;
      height: 56px;
      background: var(--primary);
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      font-family: "Noto Serif SC", "Source Han Serif SC", serif;
      letter-spacing: 1px;
      box-shadow: 0 12px 28px rgba(66, 90, 239, 0.24);
      margin-bottom: 18px;
    }

    .login-brand h1 {
      font-size: 20px;
      font-weight: 800;
      color: var(--text-primary);
      letter-spacing: 0.3px;
    }

    .login-brand p {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 0.4px;
    }

    .login-brand .brand-divider {
      display: block;
      width: 36px;
      height: 3px;
      margin: 12px auto 0;
      border-radius: 999px;
      background: linear-gradient(90deg, var(--primary), var(--gold));
    }

    /* ── Form ── */
    .form-group {
      margin-bottom: 20px;
    }

    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 700;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.3px;
    }

    .form-input {
      width: 100%;
      height: 46px;
      padding: 0 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 15px;
      color: var(--text-primary);
      background: var(--bg-body);
      transition: all var(--transition);
    }

    .form-input:focus {
      border-color: var(--primary);
      background: var(--bg-card);
      box-shadow: 0 0 0 3px var(--primary-bg);
    }

    .form-input::placeholder {
      color: var(--text-placeholder);
    }

    .form-error {
      background: rgba(255, 77, 79, 0.06);
      color: var(--vermilion);
      font-size: 13px;
      font-weight: 600;
      padding: 10px 14px;
      border-radius: 8px;
      margin-bottom: 20px;
      display: none;
      letter-spacing: 0.2px;
    }

    .form-error.visible {
      display: block;
      animation: shake 0.3s ease;
    }

    .btn-login {
      width: 100%;
      height: 46px;
      background: var(--primary);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border-radius: var(--radius);
      letter-spacing: 0.4px;
      transition: all var(--transition);
      box-shadow: 0 8px 20px rgba(66, 90, 239, 0.2);
      margin-top: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-login:hover {
      background: var(--primary-deep);
      box-shadow: 0 12px 28px rgba(66, 90, 239, 0.3);
      transform: translateY(-1px);
    }

    .btn-login:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(66, 90, 239, 0.2);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-login .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      display: none;
    }

    .btn-login.loading .spinner { display: block; }
    .btn-login.loading .btn-text { display: none; }

    .login-footer {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: var(--text-muted);
    }

    .login-footer a {
      color: var(--primary);
      font-weight: 600;
      text-decoration: none;
      transition: color var(--transition);
    }

    .login-footer a:hover { color: var(--primary-deep); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>

<div class="login-wrapper">
  <div class="login-card">
    <div class="login-brand">
      <div class="login-brand-icon">安</div>
      <h1>Soar Blog</h1>
      <p>管理后台登录</p>
      <span class="brand-divider"></span>
    </div>

    <div class="form-error" id="form-error"></div>

    <form id="login-form" autocomplete="off">
      <div class="form-group">
        <label class="form-label" for="username">用户名</label>
        <input type="text" class="form-input" id="username" placeholder="请输入用户名" autofocus autocomplete="username">
      </div>
      <div class="form-group">
        <label class="form-label" for="password">密码</label>
        <input type="password" class="form-input" id="password" placeholder="请输入密码" autocomplete="current-password">
      </div>
      <button type="submit" class="btn-login" id="btn-login">
        <span class="spinner"></span>
        <span class="btn-text">登 录</span>
      </button>
    </form>
  </div>
  <div class="login-footer">
    <a href="/blog/" target="_blank">← 返回博客首页</a>
  </div>
</div>

<script>
(function () {
  'use strict';

  const API = location.pathname.replace(/\/admin\/login\.html.*$/, '') + '/admin/api/auth/';
  const ADMIN_URL = location.pathname.replace(/\/admin\/login\.html.*$/, '') + '/admin/';

  const form = document.getElementById('login-form');
  const btn = document.getElementById('btn-login');
  const errorEl = document.getElementById('form-error');
  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');

  function showError(msg) {
    errorEl.textContent = msg;
    errorEl.classList.add('visible');
  }

  function hideError() {
    errorEl.classList.remove('visible');
  }

  function setLoading(loading) {
    if (loading) {
      btn.classList.add('loading');
      btn.disabled = true;
    } else {
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  }

  form.addEventListener('submit', async function (e) {
    e.preventDefault();
    hideError();

    const username = usernameInput.value.trim();
    const password = passwordInput.value;

    if (!username || !password) {
      showError('请输入用户名和密码');
      return;
    }

    setLoading(true);

    try {
      const res = await fetch(API + 'login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ username, password }),
      });

      const data = await res.json();

      if (data.success) {
        // Store token
        localStorage.setItem('admin_token', data.token);
        localStorage.setItem('admin_user', JSON.stringify(data.user));
        // Redirect to admin panel
        location.replace(ADMIN_URL);
      } else {
        showError(data.error || '登录失败，请重试');
      }
    } catch (err) {
      console.error('Login error:', err);
      showError('网络错误，请检查连接');
    } finally {
      setLoading(false);
    }
  });

  // Enter key on password field to submit
  passwordInput.addEventListener('keydown', function (e) {
    if (e.key === 'Enter') {
      form.dispatchEvent(new Event('submit'));
    }
  });
})();
</script>

</body>
</html>
